name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: DarkFactions
          path: target/DarkFactions-*.jar
          if-no-files-found: error
