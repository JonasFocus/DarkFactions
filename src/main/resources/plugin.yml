# ==========================================
# DarkFactions - plugin.yml
# Main config file that tells Spigot about our plugin
# ==========================================

name: DarkFactions
version: 3.2
main: com.darkfactions.DarkFactions
api-version: 1.20

# Who made this awesome plugin
author: DarkServer Team
description: A nostalgic factions plugin with Elixir points and faction power system

# ==========================================
# Commands - /f is our main command
# All subcommands handled in FactionCommand.java
# ==========================================
commands:
  faction:
    description: Main DarkFactions command - use /f for all faction stuff
    aliases: [f, fac, factions]
    usage: /<command> <subcommand> [args]

permissions:
  darkfactions.use:
    description: Allows a player to use basic faction commands
    default: true

  darkfactions.admin:
    description: Gives access to admin faction commands like /f admin
    default: op

  darkfactions.create:
    description: Allows a player to create a new faction
    default: true

  darkfactions.ally:
    description: Allows a player to manage alliances
    default: true