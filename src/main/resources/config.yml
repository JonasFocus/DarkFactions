# ==========================================
# DarkFactions - Ultra Customizable Config
# ==========================================
# Every aspect of the plugin can be tuned here.
# Reload with: /f admin reload
# ==========================================

# ==========================================
# QUICK START
# ==========================================
# New to DarkFactions? Tweak these values first.
# Everything below has a sensible default.
# ==========================================
quick-start:
  power:
    max-player-power: 10.0
    loss-on-death: 1.0
    offline-decay-enabled: false
  claiming:
    max-per-faction: 25
    require-connection: true
  faction:
    max-members: 30

# ==========================================
# DATABASE
# ==========================================
database:
  # Storage backend: SQLITE or MYSQL
  # SQLITE is embedded (no server needed), good for small servers
  # MYSQL requires a database server (better for 100+ players)
  type: SQLITE

  # MySQL connection details (only used when type is MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: darkfactions
    username: root
    password: ""

  # How often data is written to the database (seconds)
  # Data is always in memory, this is just persistence frequency
  save-interval-seconds: 120

# ==========================================
# GENERAL SETTINGS
# ==========================================
general:
  # Language file (future use - en, fr, de, es, etc.)
  language: en

  # Check for updates on startup
  check-updates: true

  # Metrics/analytics tracking
  metrics-enabled: false

  # How often auto-save runs (in seconds, 0 = disabled)
  auto-save-interval-seconds: 300

# ==========================================
# POWER SETTINGS
# Controls ALL aspects of faction power
# ==========================================
power:
  # Starting power for a new player (when first seen)
  default-player-power: 10.0

  # Maximum power a single player can accumulate
  max-player-power: 10.0

  # How often power regenerates while online (in seconds)
  regen-interval-seconds: 300

  # How much power is regained per regen tick
  regen-amount: 0.5

  # Power lost on death (PVP only, not PVE)
  loss-on-death: 1.0

  # Power lost on death from mobs/fall/lava (PVE)
  loss-on-pve-death: 0.0

  # Power gained for killing another player
  gain-on-kill: 0.5

  # Enable power decay while offline
  offline-decay-enabled: false

  # Power lost per hour while offline (only if enabled above)
  offline-decay-per-hour: 0.5

  # Maximum hours a player can be offline before decay stops
  offline-decay-max-hours: 48

  # Minimum power a player can have (can't go below this)
  min-player-power: 0.0

  # Whether to show power changes in chat
  show-power-changes: true

  # Power gained for killing a mob
  gain-on-mob-kill: 0.0

  # Power gained for winning a raid
  gain-on-raid-win: 5.0

# ==========================================
# ELIXIR SETTINGS
# Controls the faction economy / points system
# ==========================================
elixir:
  # Elixir earned for killing an enemy faction member
  per-enemy-kill: 5.0

  # Elixir earned for killing any player
  per-any-kill: 1.0

  # Elixir earned for raiding another faction (steal)
  per-raid: 25.0

  # Percentage of victim's elixir stolen on raid (0.0 - 1.0)
  raid-steal-percent: 0.5

  # Daily login bonus (given on join, claimed via /f elixir)
  daily-bonus: 10.0

  # Auto-claim daily bonus on login (no need to /f elixir)
  auto-claim-on-join: false

  # Elixir earned for successfully claiming a chunk
  per-chunk-claim: 0.0

  # Elixir lost when a chunk is unclaimed/raided
  per-chunk-lost: 2.0

  # Elixir earned per hour of playtime
  per-playtime-hour: 2.0

  # Cost (in elixir) to create a new faction (0 = free)
  create-faction-cost: 0.0

  # Cost (in elixir) to rename a faction (0 = free)
  rename-faction-cost: 10.0

  # Cost (in elixir) to set a faction tag (0 = free)
  set-tag-cost: 5.0

  # Enable elixir transfer between factions
  transfer-enabled: false

  # Tax rate for faction transfers (0.0 = no tax, 0.1 = 10% tax)
  transfer-tax-rate: 0.0

# ==========================================
# FACTION SETTINGS
# Core faction mechanics and limits
# ==========================================
faction:
  # Minimum length for faction names
  min-name-length: 2

  # Maximum length for faction names
  max-name-length: 32

  # Allowed characters in faction names. This is a FULL-STRING regex matched
  # against the whole name (via String.matches), so it must be anchored and
  # quantified. Use a character class followed by '+', e.g. add a space or
  # hyphen inside the brackets to allow them: '^[a-zA-Z0-9_ -]+$'.
  # (A bare class like '[a-zA-Z0-9_]' matches only ONE character and rejects
  # every real name.)
  name-allowed-chars: '^[a-zA-Z0-9_]+$'

  # Maximum number of members in one faction
  max-members: 30

  # Starting power for a brand new faction
  starting-power: 10.0

  # Maximum power a faction can achieve (not including player power)
  starting-max-power: 50.0

  # Max officers per faction (0 = unlimited)
  max-officers: 5

  # Cooldown for /f home in seconds (0 = no cooldown)
  home-cooldown-seconds: 30

  # Teleport delay for /f home in seconds (0 = instant)
  home-teleport-delay-seconds: 0

  # Whether /f home takes damage (cancels teleport if hit)
  home-cancel-on-damage: true

  # Max number of factions a player can create (0 = unlimited, 1 = default)
  max-factions-per-player: 1

  # Whether empty factions auto-disband
  auto-disband-empty: true

  # Whether disband requires typing the faction name to confirm
  disband-requires-confirm: true

  # Whether to broadcast faction creations/deletions globally
  broadcast-faction-news: true

  # Max tag length
  max-tag-length: 6

  # Max description length
  max-description-length: 100

  # Max MOTD length
  max-motd-length: 255

  # Default faction open status (true = anyone can join without invite)
  default-open: false

  # Default PvP status (true = members can hurt each other)
  default-pvp: false

  # Default TNT status (true = TNT works in territory)
  default-tnt: true

# ==========================================
# LAND CLAIMING SETTINGS
# Full control over territory claiming
# ==========================================
claim:
  # Whether claiming is enabled at all
  enabled: true

  # Maximum chunks a single faction can claim
  max-per-faction: 25

  # Elixir cost to claim one chunk (0 = free)
  cost-elixir: 0.0

  # Whether new claims must be adjacent to existing territory
  require-connection: true

  # First claim is always free (ignores adjacency, cost, etc.)
  first-claim-free: true

  # Minimum distance from world spawn to claim (in chunks)
  min-distance-from-spawn-chunks: 0

  # Worlds where claiming is disabled
  # List world names below, e.g. ["world_nether", "world_the_end"]
  disabled-worlds: []

  # Worlds where claiming is only allowed (empty = all worlds allowed)
  # If empty, all worlds allow claiming
  # If populated, ONLY these worlds allow claiming
  whitelist-worlds: []

  # Whether players can unclaim chunks from other factions (raid-style)
  can-unclaim-enemy: false

  # Chunks needed to claim/unclaim at once (0 = no limit)
  max-claim-per-session: 0
  max-unclaim-per-session: 0

  # Buffer zone around each claim (in chunks) - prevents corner-touching
  claim-buffer-chunks: 0

  # Whether to show the chunk border particles when claiming
  show-border-particles: true

  # Particle type for claim borders (https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html)
  border-particle-type: "REDSTONE"

  # Particle color (RGB) for own faction border
  border-own-color:
    red: 0
    green: 255
    blue: 0

  # Particle color (RGB) for enemy faction border
  border-enemy-color:
    red: 255
    green: 0
    blue: 0

# ==========================================
# TERRITORY PROTECTION
# Controls who can do what in claimed land
# ==========================================
protection:
  # Whether territory protection is enabled
  enabled: true

  # Whether allies can interact with blocks (chests, doors, etc.)
  allies-can-interact: true

  # Whether allies can break blocks
  allies-can-break: false

  # Whether allies can place blocks
  allies-can-place: false

  # Whether faction members (not officers) can invite others
  members-can-invite: false

  # Whether faction members (not officers) can kick members
  members-can-kick: false

  # Whether faction members (not officers) can claim land
  members-can-claim: false

  # Whether faction members (not officers) can set home
  members-can-sethome: false

  # PVP settings
  pvp:
    # Enable PVP at all times in the wilderness
    wilderness-pvp: true

    # Enable PVP in own territory
    own-territory-pvp: true

    # Enable PVP in allied territory
    ally-territory-pvp: false

    # Enable PVP in enemy territory (always true in claimed enemy land)
    enemy-territory-pvp: true

    # Prevent PVP in the same faction if pvp toggle is off
    respect-faction-pvp-toggle: true

  # TNT / Explosion settings
  explosions:
    # Whether explosions are enabled at all in claimed territory
    enabled-in-claims: true

    # Whether explosions respect the per-faction TNT toggle
    respect-faction-tnt-toggle: true

    # Whether explosions damage blocks in wilderness
    damage-wilderness: true

# ==========================================
# TERRITORY BORDER MESSAGES
# Customize what players see when crossing borders
# ==========================================
territory-messages:
  # Whether border messages are enabled
  enabled: true

  # Message when entering your own faction's territory
  # Placeholders: {faction}, {leader}, {members}, {power}, {elixir}
  enter-own: "&aNow entering {faction}'s territory"

  # Message when entering an ally's territory
  enter-ally: "&7Now entering {faction}'s territory (ally)"

  # Message when entering an enemy's territory
  enter-enemy: "&cNow entering {faction}'s territory! Watch your back!"

  # Message when leaving claimed territory into wilderness
  exit: "&7Now leaving {faction}'s territory"

# ==========================================
# ASCII MAP SETTINGS
# Customize the /f map display
# ==========================================
map:
  # Default radius for /f map
  default-radius: 4

  # Maximum radius allowed
  max-radius: 8

  # Characters used for the map display
  # You can use unicode characters
  character-own-player: "⬤"  # The chunk you're standing in (own)
  character-own: "□"         # Own faction territory
  character-ally: "◇"        # Ally territory
  character-enemy: "■"       # Enemy territory
  character-wilderness: "·"  # Unclaimed land

  # Color codes (using Minecraft color codes: &0-&f, &a-&f)
  color-own: "&a"
  color-ally: "&9"
  color-enemy: "&c"
  color-wilderness: "&7"

# ==========================================
# CHAT SETTINGS
# Customize faction and ally chat formatting
# ==========================================
chat:
  # Enable faction-only chat (/f chat or /fc)
  faction-chat-enabled: true

  # Enable ally chat (/f allychat or /ac)
  ally-chat-enabled: true

  # Format for faction chat messages
  # Placeholders: {prefix}, {tag}, {player}, {message}, {faction}
  faction-chat-format: "&d[F] {tag}{player}&7: &f{message}"

  # Format for ally chat messages
  ally-chat-format: "&b[A] {tag}{player}&7: &f{message}"

  # Whether to log faction/ally chat to console
  log-chat-to-console: true

# ==========================================
# FLIGHT SETTINGS
# Control /f fly
# ==========================================
flight:
  # Whether /f fly is enabled at all
  enabled: true

  # Whether flight is restricted to own territory only
  own-territory-only: true

  # Whether to disable flight when leaving territory
  auto-disable-on-exit: true

  # Whether to send message when flight is disabled on exit
  notify-on-exit: true

# ==========================================
# LEADERBOARD SETTINGS
# ==========================================
leaderboard:
  # How many factions to show in /f top
  default-limit: 10

  # Maximum limit allowed
  max-limit: 50

  # Sort options enabled (power, elixir, members, land)
  sort-options:
    - power
    - elixir
    - members
    - land

# ==========================================
# ADMIN & ECONOMY SETTINGS
# ==========================================
admin:
  # Whether players with darkfactions.admin bypass all protection
  bypass-protection: true

  # Whether admin commands are logged to console
  log-admin-actions: true

economy:
  # Example: integration with Vault (future)
  # Vault economy integration for elixir <-> money conversion
  vault-enabled: false
  vault-elixir-to-money-rate: 10.0  # 1 elixir = 10 money
  vault-money-to-elixir-rate: 12.0  # 12 money = 1 elixir (fee)